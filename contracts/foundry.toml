[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
evm_version = "london"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@onchain-id/solidity/=lib/solidity/",
    "@T-REX/=lib/T-REX/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@ictt/=lib/avalanche-interchain-token-transfer/contracts/src/",
    "@teleporter/=lib/avalanche-interchain-token-transfer/contracts/lib/teleporter/contracts/src/Teleporter/",
    "@avalabs/subnet-evm-contracts@1.2.0/=lib/avalanche-interchain-token-transfer/contracts/lib/teleporter/contracts/lib/subnet-evm/contracts/",
    "@openzeppelin/contracts@4.8.1/=lib/openzeppelin-contracts/contracts/",
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
local = "${L1_RPC_URL}"
